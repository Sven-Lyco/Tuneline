<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="label" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ff5598"/>
      <stop offset="100%" stop-color="#cc1454"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="96" fill="#08080d"/>

  <!-- Outer neon ring glow -->
  <circle cx="256" cy="256" r="212" fill="none" stroke="#ff2d78" stroke-width="3" opacity="0.25" filter="url(#glow)"/>

  <!-- Vinyl body -->
  <circle cx="256" cy="256" r="210" fill="url(#vinyl)"/>

  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="#1f1f30" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="183" fill="none" stroke="#1f1f30" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#1f1f30" stroke-width="2"/>
  <circle cx="256" cy="256" r="153" fill="none" stroke="#1c1c2c" stroke-width="2"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#1c1c2c" stroke-width="1.5"/>

  <!-- Label area -->
  <circle cx="256" cy="256" r="110" fill="url(#label)"/>

  <!-- Label shine -->
  <ellipse cx="230" cy="218" rx="44" ry="28" fill="white" opacity="0.08"/>

  <!-- Timeline on label: line + 3 dots -->
  <line x1="176" y1="256" x2="336" y2="256" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <circle cx="210" cy="256" r="10" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="10" fill="white" opacity="0.95"/>
  <circle cx="302" cy="256" r="10" fill="white" opacity="0.95"/>

  <!-- Center hole (cuts through middle dot) -->
  <circle cx="256" cy="256" r="18" fill="#08080d"/>

  <!-- Subtle outer vinyl edge highlight -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ff2d78" stroke-width="1.5" opacity="0.4"/>
</svg>
